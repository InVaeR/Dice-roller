<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <link rel="icon" type="image/png" href="res/images/icon.png">
    <link rel="shortcut icon" type="image/png" href="res/images/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-particles" id="bgParticles"></div>
<div class="crit-flash" id="critFlash"></div>

<div class="roll-container" id="rollContainer">

    <!-- Режим -->
    <div class="mode-switcher">
        <button class="mode-btn active" id="modeCheck" onclick="setMode('check')">Проверка</button>
        <button class="mode-btn" id="modeFree" onclick="setMode('free')">Бросок</button>
    </div>

    <!-- Селектор кубиков (только для свободного броска) -->
    <div class="dice-selector hidden" id="diceSelector">
        <button class="dice-type-btn" data-sides="4" onclick="selectDice(4)">D4</button>
        <button class="dice-type-btn" data-sides="6" onclick="selectDice(6)">D6</button>
        <button class="dice-type-btn" data-sides="8" onclick="selectDice(8)">D8</button>
        <button class="dice-type-btn" data-sides="10" onclick="selectDice(10)">D10</button>
        <button class="dice-type-btn" data-sides="12" onclick="selectDice(12)">D12</button>
        <button class="dice-type-btn active" data-sides="20" onclick="selectDice(20)">D20</button>
        <button class="dice-type-btn" data-sides="100" onclick="selectDice(100)">D100</button>
    </div>

    <!-- Отображение проверки (сверху, красиво) -->
    <div class="check-display visible" id="checkDisplay">
        <div class="display-skill-name" id="displaySkillName">Убеждение</div>
        <div class="display-mod-dc">
            <div class="display-badge">
                <span class="display-badge-label">Модификатор</span>
                <span class="display-badge-value positive" id="displayMod">+3</span>
            </div>
            <div class="display-badge">
                <span class="display-badge-label">Сложность</span>
                <span class="display-badge-value" id="displayDC">DC 15</span>
            </div>
        </div>
    </div>

    <!-- Свободный бросок — заглушка -->
    <div class="check-display hidden" id="freeDisplay">
        <div style="font-size: 13px; color: var(--text-secondary); letter-spacing: 2px;">
            Простой бросок D20
        </div>
    </div>

    <div class="divider"></div>
    <div class="dice-type-label" id="diceTypeLabel">D20</div>

    <!-- Зона кубика -->
    <div class="dice-area">
        <div class="dice-glow"></div>

        <div class="dc-ring" id="dcRing">
            <svg viewBox="0 0 200 200">
                <circle class="dc-ring-bg" cx="100" cy="100" r="90"/>
                <circle class="dc-ring-fill" id="dcRingFill" cx="100" cy="100" r="90"/>
            </svg>
        </div>

        <div class="rune-ring">
            <div class="rune" style="transform:translate(-50%,-50%) rotate(0deg) translateY(-95px)">
                <span class="rune-inner">ᚦ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(45deg) translateY(-95px)">
                <span class="rune-inner">ᚱ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(90deg) translateY(-95px)">
                <span class="rune-inner">ᚨ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(135deg) translateY(-95px)">
                <span class="rune-inner">ᚹ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(180deg) translateY(-95px)">
                <span class="rune-inner">ᛗ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(225deg) translateY(-95px)">
                <span class="rune-inner">ᛞ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(270deg) translateY(-95px)">
                <span class="rune-inner">ᛉ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(315deg) translateY(-95px)">
                <span class="rune-inner">ᛏ</span></div>
        </div>

        <div class="dice-svg-container" id="diceContainer" onclick="rollDice()">
            <img class="dice-image" id="diceImage" src="res/images/dices/d20.png" alt="D20"/>
            <span class="dice-number" id="diceNumber">?</span>
            <div class="modifier-badge" id="modBadge">+3</div>
            <div class="spark-container" id="sparkContainer"></div>
            <div class="burst-ring" id="burstRing"></div>
        </div>
    </div>

    <!-- Результат -->
    <div class="result-area">
        <div class="result-total" id="resultTotal"></div>
        <div class="result-breakdown" id="resultBreakdown"></div>
        <div class="result-label" id="resultLabel"></div>
    </div>

    <!-- Кнопка -->
    <div class="buttons-row">
        <button class="roll-btn" id="rollBtn" onclick="rollDice()">
            Бросить кубик
        </button>
    </div>
</div>

<!-- Кнопка настроек — в правом нижнем углу -->
<button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()" title="Настройки">
    ⚙
</button>

<!-- Модальное окно настроек -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOnOverlay(event)">
    <div class="settings-modal" id="settingsModal">
        <div class="settings-modal-header">
            <span class="settings-modal-title">Настройки</span>
            <button class="settings-close" onclick="toggleSettings()" title="Закрыть">✕</button>
        </div>
        <div class="skill-select-row">
            <select class="skill-select" id="skillSelect" onchange="onSkillSelect()">
                <option value="">— выбрать —</option>
                <optgroup label="Характеристики">
                    <option value="Сила">Сила</option>
                    <option value="Ловкость">Ловкость</option>
                    <option value="Телосложение">Телосложение</option>
                    <option value="Интеллект">Интеллект</option>
                    <option value="Мудрость">Мудрость</option>
                    <option value="Харизма">Харизма</option>
                </optgroup>
                <optgroup label="Навыки">
                    <option value="Акробатика">Акробатика</option>
                    <option value="Анализ">Анализ</option>
                    <option value="Атлетика">Атлетика</option>
                    <option value="Внимательность">Внимательность</option>
                    <option value="Выживание">Выживание</option>
                    <option value="Выступление">Выступление</option>
                    <option value="Запугивание">Запугивание</option>
                    <option value="История">История</option>
                    <option value="Ловкость рук">Ловкость рук</option>
                    <option value="Медицина">Медицина</option>
                    <option value="Обман">Обман</option>
                    <option value="Природа">Природа</option>
                    <option value="Проницательность">Проницательность</option>
                    <option value="Религия">Религия</option>
                    <option value="Скрытность">Скрытность</option>
                    <option value="Убеждение">Убеждение</option>
                    <option value="Уход за животными">Уход за животными</option>
                </optgroup>
            </select>
        </div>
        <div class="settings-grid">
            <div class="editable-group">
                <span class="editable-label">Навык</span>
                <input type="text" class="editable-input skill-input" id="skillInput"
                       value="Убеждение" spellcheck="false" maxlength="25"
                       oninput="updateDisplay()">
            </div>
            <div class="editable-group">
                <span class="editable-label">Модификатор</span>
                <input type="number" class="editable-input mod-input" id="modInput"
                       value="3" min="-10" max="20"
                       oninput="updateDisplay()">
            </div>
            <div class="editable-group">
                <span class="editable-label">DC</span>
                <input type="number" class="editable-input dc-input" id="dcInput"
                       value="15" min="1" max="30"
                       oninput="updateDisplay()">
            </div>
        </div>
        <div class="dc-difficulty-hint" id="dcHint">Средняя сложность</div>

        <!-- Громкость -->
        <div class="settings-section">
            <div class="settings-section-title">Оформление</div>
            <div class="volume-row">
                <span class="volume-label">Тема</span>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                    <span id="themeIcon">☀️</span>
                    <span id="themeLabel">Светлая</span>
                </button>
            </div>
        </div>

        <!-- Громкость -->
        <div class="settings-section">
            <div class="settings-section-title">Звук</div>
            <div class="volume-row">
                <span class="volume-label">Громкость</span>
                <input type="range" class="volume-slider" id="volumeSlider"
                       min="0" max="100" value="50"
                       oninput="updateVolume(this.value)">
                <span class="volume-value" id="volumeValue">50%</span>
            </div>
        </div>

        <!-- Сброс данных -->
        <div class="settings-section">
            <div class="settings-section-title">Данные</div>
            <button class="reset-btn" onclick="resetSavedSkills()">Сбросить модификаторы</button>
        </div>
    </div>
</div>

<!-- История -->
<div class="roll-history" id="rollHistory"></div>

<!-- Подсказка -->
<div class="key-hint">
    <kbd>Пробел</kbd> или <kbd>Enter</kbd> — бросить
</div>

    <script src="script.js"></script>
</body>
</html>
