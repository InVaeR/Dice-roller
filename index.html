<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мистический D&D Кубик</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/dice.css">
    <link rel="stylesheet" href="css/result.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="bg-particles" id="bgParticles"></div>
<div class="crit-flash" id="critFlash"></div>

<!-- Ссылка на автора (сверху страницы) -->
<a class="author-link-top" href="https://vk.com/invaer" target="_blank" rel="noopener noreferrer" title="Автор: Груздков Д.А.">

    </svg>
    <span>Груздков Д.А.</span>
</a>

<div class="roll-container" id="rollContainer">

    <div class="mode-switcher">
        <button class="mode-btn active" id="modeCheck" data-mode="check">Проверка</button>
        <button class="mode-btn" id="modeFree" data-mode="free">Бросок</button>
    </div>

    <div class="dice-selector hidden" id="diceSelector">
        <button class="dice-type-btn" data-sides="4">D4</button>
        <button class="dice-type-btn" data-sides="6">D6</button>
        <button class="dice-type-btn" data-sides="8">D8</button>
        <button class="dice-type-btn" data-sides="10">D10</button>
        <button class="dice-type-btn" data-sides="12">D12</button>
        <button class="dice-type-btn active" data-sides="20">D20</button>
        <button class="dice-type-btn" data-sides="100">D100</button>
    </div>

    <div class="count-selector hidden" id="countSelector">
        <span class="count-label">Количество</span>
        <button class="count-btn" id="countMinus">−</button>
        <span class="count-value" id="countValue">1</span>
        <button class="count-btn" id="countPlus">+</button>
        <span class="count-suffix" id="countSuffix">×D20</span>
    </div>

    <div class="check-display visible" id="checkDisplay">
        <div class="display-skill-name" id="displaySkillName">Убеждение</div>
        <div class="display-mod-dc">
            <div class="display-badge">
                <span class="display-badge-label">Модификатор</span>
                <span class="display-badge-value positive" id="displayMod">+3</span>
            </div>
            <div class="display-badge">
                <span class="display-badge-label">Сложность</span>
                <span class="display-badge-value" id="displayDC">DC 15</span>
            </div>
        </div>
    </div>

    <div class="check-display hidden" id="freeDisplay">
        <div class="free-display-text" id="freeDisplayText">Простой бросок D20</div>
    </div>

    <div class="divider"></div>
    <div class="dice-type-label" id="diceTypeLabel">D20</div>

    <div class="dice-area">
        <div class="dice-glow"></div>

        <div class="dc-ring" id="dcRing">
            <svg viewBox="0 0 200 200">
                <circle class="dc-ring-bg" cx="100" cy="100" r="90"/>
                <circle class="dc-ring-fill" id="dcRingFill" cx="100" cy="100" r="90"/>
            </svg>
        </div>

        <div class="rune-ring" id="runeRing">
            <div class="rune" style="transform:translate(-50%,-50%) rotate(0deg)   translateY(-95px) rotate(180deg)"><span class="rune-inner">ᚦ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(45deg)  translateY(-95px) rotate(180deg)"><span class="rune-inner">ᚱ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(90deg)  translateY(-95px) rotate(180deg)"><span class="rune-inner">ᚨ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(135deg) translateY(-95px) rotate(180deg)"><span class="rune-inner">ᚹ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(180deg) translateY(-95px) rotate(180deg)"><span class="rune-inner">ᛗ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(225deg) translateY(-95px) rotate(180deg)"><span class="rune-inner">ᛞ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(270deg) translateY(-95px) rotate(180deg)"><span class="rune-inner">ᛉ</span></div>
            <div class="rune" style="transform:translate(-50%,-50%) rotate(315deg) translateY(-95px) rotate(180deg)"><span class="rune-inner">ᛏ</span></div>
        </div>

        <div class="dice-svg-container" id="diceContainer">
            <img class="dice-image" id="diceImage" src="res/images/dices/d20.png" alt="D20"/>
            <span class="dice-number" id="diceNumber">?</span>
            <div class="multi-badge" id="multiBadge">×1</div>
            <div class="modifier-badge" id="modBadge">+3</div>
            <div class="spark-container" id="sparkContainer"></div>
            <div class="burst-ring" id="burstRing"></div>
        </div>
    </div>

    <div class="result-area">
        <div class="result-total" id="resultTotal"></div>
        <div class="result-breakdown" id="resultBreakdown"></div>
        <div class="result-label" id="resultLabel"></div>
    </div>

    <div class="buttons-row">
        <button class="roll-btn" id="rollBtn">Бросить кубик</button>
    </div>
</div>

<button class="settings-toggle" id="settingsToggle" title="Настройки">⚙</button>

<div class="settings-overlay" id="settingsOverlay">
    <div class="settings-modal" id="settingsModal">
        <div class="settings-modal-header">
            <span class="settings-modal-title">Настройки</span>
            <button class="settings-close" id="settingsClose" title="Закрыть">✕</button>
        </div>

        <div class="skill-select-row">
            <select class="skill-select" id="skillSelect">
                <option value="">— выбрать —</option>
                <optgroup label="Характеристики">
                    <option value="Сила">Сила</option>
                    <option value="Ловкость">Ловкость</option>
                    <option value="Телосложение">Телосложение</option>
                    <option value="Интеллект">Интеллект</option>
                    <option value="Мудрость">Мудрость</option>
                    <option value="Харизма">Харизма</option>
                </optgroup>
                <optgroup label="Навыки">
                    <option value="Акробатика">Акробатика</option>
                    <option value="Анализ">Анализ</option>
                    <option value="Атлетика">Атлетика</option>
                    <option value="Внимательность">Внимательность</option>
                    <option value="Выживание">Выживание</option>
                    <option value="Выступление">Выступление</option>
                    <option value="Запугивание">Запугивание</option>
                    <option value="История">История</option>
                    <option value="Ловкость рук">Ловкость рук</option>
                    <option value="Медицина">Медицина</option>
                    <option value="Обман">Обман</option>
                    <option value="Природа">Природа</option>
                    <option value="Проницательность">Проницательность</option>
                    <option value="Религия">Религия</option>
                    <option value="Скрытность">Скрытность</option>
                    <option value="Убеждение">Убеждение</option>
                    <option value="Уход за животными">Уход за животными</option>
                </optgroup>
            </select>
        </div>

        <div class="settings-grid">
            <div class="editable-group">
                <span class="editable-label">Навык</span>
                <input type="text" class="editable-input skill-input" id="skillInput" value="Убеждение" spellcheck="false" maxlength="25">
            </div>
            <div class="editable-group">
                <span class="editable-label">Модификатор</span>
                <input type="number" class="editable-input mod-input" id="modInput" value="3" min="-10" max="20">
            </div>
            <div class="editable-group">
                <span class="editable-label">DC</span>
                <input type="number" class="editable-input dc-input" id="dcInput" value="15" min="1" max="30">
            </div>
        </div>
        <div class="dc-difficulty-hint" id="dcHint">Средняя сложность</div>

        <div class="settings-section">
            <div class="settings-section-title">Оформление</div>
            <div class="volume-row">
                <span class="volume-label">Тема</span>
                <button class="theme-toggle" id="themeToggle">
                    <span id="themeIcon">☀️</span>
                    <span id="themeLabel">Светлая</span>
                </button>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">Анимация</div>
            <div class="volume-row">
                <span class="volume-label">Скорость</span>
                <button class="theme-toggle" id="speedToggle">
                    <span id="speedIcon">🐢</span>
                    <span id="speedLabel">Обычная</span>
                </button>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">Звук</div>
            <div class="volume-row">
                <span class="volume-label">Громкость</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
                <span class="volume-value" id="volumeValue">50%</span>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">Данные</div>
            <button class="reset-btn" id="resetBtn">Сбросить модификаторы</button>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">Об авторе</div>
            <div class="author-info">
                <span>Груздков Д.А.</span>
                <a href="https://vk.com/invaer" target="_blank" rel="noopener noreferrer">
                    <svg class="author-icon" viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M12.785 16.241s.288-.032.436-.194c.136-.148.132-.427.132-.427s-.02-1.304.587-1.496c.598-.188 1.367 1.259 2.181 1.814.615.42 1.083.328 1.083.328l2.175-.03s1.14-.07.6-.964c-.045-.073-.318-.661-1.637-1.869-1.38-1.264-1.195-1.06.467-3.248.876-1.152 1.408-1.97 1.118-2.286-.276-.3-.902-.263-.902-.263l-2.45.015s-.182-.025-.316.056c-.131.079-.216.263-.216.263s-.388 1.032-.905 1.91c-1.091 1.853-1.527 1.951-1.707 1.837-.417-.265-.313-1.065-.313-1.637 0-1.789.271-2.531-.528-2.725-.266-.064-.461-.106-1.14-.113-.87-.009-1.606.003-2.024.207-.278.136-.492.438-.362.455.161.021.526.098.719.36.249.339.24 1.101.24 1.101s.143 2.09-.333 2.348c-.327.178-.775-.185-1.74-1.843-.494-.85-.868-1.79-.868-1.79s-.072-.176-.2-.271c-.155-.115-.372-.151-.372-.151l-2.328.015s-.35.01-.478.162c-.114.135-.01.414-.01.414s1.82 4.258 3.879 6.403c1.886 1.963 4.032 1.833 4.032 1.833h.975z"/>
                    </svg>
                    VK
                </a>
            </div>
        </div>
    </div>
</div>

<div class="roll-history" id="rollHistory"></div>

<div class="key-hint">
    <kbd>Пробел</kbd> или <kbd>Enter</kbd> — бросить
</div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/audio.js"></script>
<script src="js/effects.js"></script>
<script src="js/ui.js"></script>
<script src="js/settings.js"></script>
<script src="js/dice.js"></script>
<script src="js/main.js"></script>

</body>
</html>
